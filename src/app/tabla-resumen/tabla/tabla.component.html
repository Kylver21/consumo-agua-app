<h2>Resumen de avance</h2>
<table>
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Hora</th>
      <th>Consumo (L)</th>
      <th>Meta (L)</th>
      <th>Estado</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let c of consumos; let i = index">
      <td data-label="Fecha">{{ c.fecha }}</td>
      <td data-label="Hora">{{ c.hora }}</td>
      <td data-label="Consumo (L)">{{ c.cantidad | number:'1.2-2' }}</td>
      <td data-label="Meta (L)">{{ meta | number:'1.2-2' }}</td>
      <td data-label="Estado" [ngClass]="getEstadoClase(i)">
        {{ getEstado(i) }}
      </td>
    </tr>
  </tbody>
</table>
